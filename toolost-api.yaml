openapi: 3.0.3
info:
  title: Too Lost Music Distribution API
  description: |
    Unofficial OpenAPI specification for the Too Lost music distribution platform (toolost.com).
    Generated from observed network traffic. Covers authentication, release management,
    distribution, analytics, wallet/payouts, reporting, and platform utilities.
  version: 1.0.0
  contact:
    name: Too Lost Support
    url: https://toolost.com/support/contact
    email: support@toolost.com
  termsOfService: https://toolost.com/terms

servers:
  - url: https://toolost.com/api
    description: Production

tags:
  - name: Auth
    description: Authentication and user session
  - name: Distribution
    description: Release creation, editing, and track management
  - name: Portal - Releases
    description: Release catalog browsing and management
  - name: Portal - Analytics
    description: Streaming analytics and channel data
  - name: Portal - Wallet
    description: Wallet balance, transactions, and payouts
  - name: Portal - Sales
    description: Sales data and revenue
  - name: Portal - Reports
    description: Report generation and download
  - name: Portal - Dashboard
    description: Dashboard widgets and summary data
  - name: Portal - Notifications
    description: User notifications
  - name: Portal - Preferences
    description: Artist and label preferences
  - name: Portal - Audience
    description: Fan/audience data
  - name: Portal - Defender
    description: Content protection (whitelist/blocklist)
  - name: Portal - Quicklinks
    description: Smart links for releases
  - name: Portal - Funding
    description: Advance funding and submissions
  - name: Portal - Publishing
    description: Publishing administration
  - name: Portal - AI Insights
    description: AI-powered artwork and insights
  - name: Portal - Award Monitoring
    description: Chart and award tracking by market
  - name: Portal - Playlisting
    description: Playlist pitching
  - name: Portal - Channel Monetization
    description: YouTube channel monetization and CID
  - name: Portal - Mixing
    description: AI mixing tools
  - name: Portal - Manager
    description: User/team manager access
  - name: Video
    description: Video distribution
  - name: Shared
    description: Static data (countries, platforms, genres)
  - name: Profile
    description: User profile and payout settings

paths:
  # ──────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                googleCaptchaToken:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  token:
                    type: string
        '401':
          description: Invalid credentials

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated

  /auth/get-change-logs:
    get:
      tags: [Auth]
      summary: Get platform change logs
      operationId: getChangeLogs
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Change log entries

  # ──────────────────────────────────────────────
  # DISTRIBUTION
  # ──────────────────────────────────────────────
  /distribution/init-release:
    post:
      tags: [Distribution]
      summary: Initialize a new release
      operationId: initRelease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseInput'
      responses:
        '200':
          description: Release initialized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  id:
                    type: integer
                    description: New release ID

  /distribution/save/release:
    post:
      tags: [Distribution]
      summary: Save/update a release
      operationId: saveRelease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseInput'
      responses:
        '200':
          description: Release saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  id:
                    type: integer

  /distribution/save/tracks:
    post:
      tags: [Distribution]
      summary: Save tracks for a release
      operationId: saveTracks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [release_id, tracks]
              properties:
                release_id:
                  type: integer
                tracks:
                  type: array
                  items:
                    $ref: '#/components/schemas/TrackInput'
      responses:
        '200':
          description: Tracks saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  release:
                    type: object
                    properties:
                      tracks:
                        type: array
                        items:
                          $ref: '#/components/schemas/Track'

  /distribution/release/{releaseId}:
    get:
      tags: [Distribution]
      summary: Get release details (draft/uploader view)
      operationId: getDistributionRelease
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Release details
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    $ref: '#/components/schemas/Release'

  /distribution/release/{releaseId}/load-platforms:
    get:
      tags: [Distribution]
      summary: Get selected platforms for a release
      operationId: loadReleasePlatforms
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Platform selections

  /distribution/release/{releaseId}/load-territories:
    get:
      tags: [Distribution]
      summary: Get selected territories for a release
      operationId: loadReleaseTerritories
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Territory selections

  /distribution/release/live/{releaseId}:
    get:
      tags: [Distribution]
      summary: Get a live (distributed) release
      operationId: getLiveRelease
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Live release details
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    $ref: '#/components/schemas/Release'

  /distribution/releases/{releaseId}:
    get:
      tags: [Distribution]
      summary: Get release info (alternate endpoint)
      operationId: getDistributionReleaseAlt
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Release details

  /distribution/cover-licensing:
    get:
      tags: [Distribution]
      summary: Get cover song licensing info
      operationId: getCoverLicensing
      responses:
        '200':
          description: Cover licensing data

  /distribution/track-manager:
    get:
      tags: [Distribution]
      summary: List tracks across releases
      operationId: getDistributionTrackManager
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated track list

  /distribution/user/label/artists:
    get:
      tags: [Distribution]
      summary: List artists under user's label
      operationId: getLabelArtists
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated artist list

  /distribution/video/reference-releases:
    get:
      tags: [Video]
      summary: Search releases for video distribution
      operationId: getVideoReferenceReleases
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Matching releases

  /distribution/video/reference-tracks/{releaseId}:
    get:
      tags: [Video]
      summary: Get tracks for video distribution
      operationId: getVideoReferenceTracks
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Tracks available for video

  # ──────────────────────────────────────────────
  # PORTAL - DASHBOARD
  # ──────────────────────────────────────────────
  /portal/dashboard/wallet:
    get:
      tags: [Portal - Dashboard]
      summary: Dashboard wallet summary
      operationId: getDashboardWallet
      responses:
        '200':
          description: Wallet balance summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    $ref: '#/components/schemas/WalletBalance'

  /portal/dashboard/can-instant-access:
    get:
      tags: [Portal - Dashboard]
      summary: Check instant advance eligibility
      operationId: canInstantAccess
      responses:
        '200':
          description: Eligibility status

  /portal/dashboard/pending-releases:
    get:
      tags: [Portal - Dashboard]
      summary: Get pending releases count/list
      operationId: getPendingReleases
      responses:
        '200':
          description: Pending releases

  /portal/dashboard/submissions:
    get:
      tags: [Portal - Dashboard]
      summary: Get pending submissions across features
      operationId: getDashboardSubmissions
      responses:
        '200':
          description: Submissions overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  royalty_splits:
                    type: array
                    items:
                      type: object
                  playlisting:
                    type: array
                    items:
                      type: object
                  publishing:
                    type: array
                    items:
                      type: object
                  publishing_application:
                    type: object
                    nullable: true
                  greenlisting:
                    type: array
                    items:
                      type: object
                  blocklisting:
                    type: array
                    items:
                      type: object
                  spotify_discovery_mode:
                    type: array
                    items:
                      type: object

  /portal/dashboard/tickets:
    get:
      tags: [Portal - Dashboard]
      summary: Get support tickets summary
      operationId: getDashboardTickets
      responses:
        '200':
          description: Tickets overview

  /portal/dashboard/logs:
    get:
      tags: [Portal - Dashboard]
      summary: Get activity logs
      operationId: getDashboardLogs
      responses:
        '200':
          description: Recent activity logs

  # ──────────────────────────────────────────────
  # PORTAL - RELEASES
  # ──────────────────────────────────────────────
  /portal/release/:
    get:
      tags: [Portal - Releases]
      summary: List all releases (paginated)
      operationId: listReleases
      parameters:
        - $ref: '#/components/parameters/page'
        - name: search
          in: query
          schema:
            type: string
        - name: searchType
          in: query
          schema:
            type: string
            enum: [Release Title, UPC, ISRC, Catalog Number]
        - name: filter
          in: query
          schema:
            type: string
            enum: [All, Live, Pending, Draft, Takedown, Review, Rejected]
        - name: sort
          in: query
          schema:
            type: string
            enum: [Latest, Oldest, A-Z, Z-A]
      responses:
        '200':
          description: Paginated releases
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissions:
                    $ref: '#/components/schemas/PaginatedResponse'

  /portal/release/dashboard/latest:
    get:
      tags: [Portal - Releases]
      summary: Get latest releases for dashboard
      operationId: getLatestReleases
      responses:
        '200':
          description: Latest releases

  /portal/release/single/{releaseId}:
    get:
      tags: [Portal - Releases]
      summary: Get single release detail
      operationId: getSingleRelease
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Full release details

  /portal/release/release-comments/{releaseId}:
    get:
      tags: [Portal - Releases]
      summary: Get comments on a release
      operationId: getReleaseComments
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Release comments

  /portal/release/single-participants/{releaseId}:
    get:
      tags: [Portal - Releases]
      summary: Get participants for a release
      operationId: getReleaseParticipants
      parameters:
        - $ref: '#/components/parameters/releaseId'
      responses:
        '200':
          description: Participant list

  /portal/release/edit-request:
    post:
      tags: [Portal - Releases]
      summary: Submit an edit request for a live release
      operationId: submitEditRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [release, data]
              properties:
                release:
                  type: integer
                  description: Release ID
                data:
                  type: object
                  properties:
                    releaseEdits:
                      type: array
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                          section:
                            type: string
                          value:
                            type: string
                          oldValue:
                            type: string
                    trackEdits:
                      type: array
                      items:
                        type: object
      responses:
        '200':
          description: Edit request submitted

  /portal/release/track-manager/:
    get:
      tags: [Portal - Releases]
      summary: Browse all tracks (paginated)
      operationId: getPortalTrackManager
      parameters:
        - $ref: '#/components/parameters/page'
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [Latest, Oldest]
      responses:
        '200':
          description: Paginated track list

  /portal/release/transfer-in-history/:
    get:
      tags: [Portal - Releases]
      summary: Get catalog transfer-in history
      operationId: getTransferInHistory
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Transfer history

  # ──────────────────────────────────────────────
  # PORTAL - ANALYTICS
  # ──────────────────────────────────────────────
  /portal/analytics/spotify:
    get:
      tags: [Portal - Analytics]
      summary: Spotify analytics overview
      operationId: getSpotifyAnalytics
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            description: Date filter (e.g. "7d", "30d", "all")
      responses:
        '200':
          description: Spotify streaming data

  /portal/analytics/spotify/tracks:
    get:
      tags: [Portal - Analytics]
      summary: Spotify analytics by track
      operationId: getSpotifyTrackAnalytics
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Per-track Spotify data

  /portal/analytics/spotify/territories:
    get:
      tags: [Portal - Analytics]
      summary: Spotify analytics by territory
      operationId: getSpotifyTerritoryAnalytics
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Per-territory Spotify data

  /portal/analytics/spotify/snapshot:
    get:
      tags: [Portal - Analytics]
      summary: Spotify analytics snapshot
      operationId: getSpotifySnapshot
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Spotify snapshot metrics

  /portal/analytics/channel-overview:
    get:
      tags: [Portal - Analytics]
      summary: Analytics overview for a specific platform
      operationId: getChannelOverview
      parameters:
        - name: platform
          in: query
          required: true
          schema:
            type: string
            description: Platform identifier (e.g. spotify, apple, tiktok)
        - name: date
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Platform analytics

  /portal/analytics/releases/:
    get:
      tags: [Portal - Analytics]
      summary: Analytics by release
      operationId: getAnalyticsReleases
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Per-release analytics

  # ──────────────────────────────────────────────
  # PORTAL - SALES
  # ──────────────────────────────────────────────
  /portal/sales/total:
    get:
      tags: [Portal - Sales]
      summary: Get total sales/earnings
      operationId: getSalesTotal
      responses:
        '200':
          description: Total sales figure

  /portal/sales/releases:
    get:
      tags: [Portal - Sales]
      summary: Sales broken down by release
      operationId: getSalesByRelease
      parameters:
        - $ref: '#/components/parameters/page'
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Per-release sales data

  /portal/sales/notification:
    get:
      tags: [Portal - Sales]
      summary: Sales notifications
      operationId: getSalesNotification
      parameters:
        - name: section
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Sales notification data

  # ──────────────────────────────────────────────
  # PORTAL - WALLET
  # ──────────────────────────────────────────────
  /portal/wallet/balance:
    get:
      tags: [Portal - Wallet]
      summary: Get wallet balance details
      operationId: getWalletBalance
      responses:
        '200':
          description: Wallet balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    $ref: '#/components/schemas/WalletBalance'
                  last_months_earnings:
                    type: object
                    properties:
                      split_email:
                        type: string
                      value:
                        type: string
                        format: date
                      type:
                        type: string
                      dividends:
                        type: string
                      id:
                        type: integer

  /portal/wallet/estimates:
    get:
      tags: [Portal - Wallet]
      summary: Get earnings estimates
      operationId: getWalletEstimates
      responses:
        '200':
          description: Earnings estimate
        '403':
          description: Feature not available for this account

  /portal/wallet/transactions:
    get:
      tags: [Portal - Wallet]
      summary: Get wallet transaction history
      operationId: getWalletTransactions
      responses:
        '200':
          description: Transaction list

  /portal/wallet/transfers/potential-receivers:
    get:
      tags: [Portal - Wallet]
      summary: Get potential wallet transfer recipients
      operationId: getPotentialReceivers
      responses:
        '200':
          description: List of potential recipients

  # ──────────────────────────────────────────────
  # PORTAL - REPORTS
  # ──────────────────────────────────────────────
  /portal/reports/sales-overview:
    get:
      tags: [Portal - Reports]
      summary: Sales overview report
      operationId: getSalesOverview
      responses:
        '200':
          description: Sales overview data

  /portal/reports/quick-report-status:
    get:
      tags: [Portal - Reports]
      summary: Check quick report generation status
      operationId: getQuickReportStatus
      responses:
        '200':
          description: Report status

  /portal/reports/bulk-sales-report-status:
    get:
      tags: [Portal - Reports]
      summary: Check bulk sales report status
      operationId: getBulkSalesReportStatus
      responses:
        '200':
          description: Report status

  /portal/reports/tracks-earning-report-status:
    get:
      tags: [Portal - Reports]
      summary: Check tracks earning report status
      operationId: getTracksEarningReportStatus
      responses:
        '200':
          description: Report status

  /portal/reports/artists-earning-report-status:
    get:
      tags: [Portal - Reports]
      summary: Check artists earning report status
      operationId: getArtistsEarningReportStatus
      responses:
        '200':
          description: Report status

  /portal/reports/trends-report-status:
    get:
      tags: [Portal - Reports]
      summary: Check trends report status
      operationId: getTrendsReportStatus
      responses:
        '200':
          description: Report status

  /portal/reports/stream-report-status:
    get:
      tags: [Portal - Reports]
      summary: Check stream report status
      operationId: getStreamReportStatus
      responses:
        '200':
          description: Report status

  /portal/reports/release-links-report-status:
    get:
      tags: [Portal - Reports]
      summary: Check release links report status
      operationId: getReleaseLinksReportStatus
      responses:
        '200':
          description: Report status

  /portal/reports/additional-report-status:
    get:
      tags: [Portal - Reports]
      summary: Check additional report status
      operationId: getAdditionalReportStatus
      responses:
        '200':
          description: Report status

  /portal/reports/download/trends-report:
    post:
      tags: [Portal - Reports]
      summary: Download a trends report
      operationId: downloadTrendsReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stream:
                  type: string
                  description: Data stream identifier
                  example: spotify trend data
                title:
                  type: string
                  example: Spotify Raw Data
                status:
                  type: string
                  example: allTimeData
      responses:
        '200':
          description: Report file or download URL

  /portal/reports/download/catalog-overview:
    post:
      tags: [Portal - Reports]
      summary: Download catalog overview report
      operationId: downloadCatalogOverview
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: array
                  items:
                    type: integer
                  example: [1]
      responses:
        '200':
          description: Report file or download URL

  # ──────────────────────────────────────────────
  # PORTAL - NOTIFICATIONS
  # ──────────────────────────────────────────────
  /portal/notifications:
    get:
      tags: [Portal - Notifications]
      summary: List notifications
      operationId: getNotifications
      parameters:
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated notification list

  /portal/notifications/user-notification:
    get:
      tags: [Portal - Notifications]
      summary: Get user notification preferences/count
      operationId: getUserNotification
      responses:
        '200':
          description: Notification info

  /portal/notifications/read:
    post:
      tags: [Portal - Notifications]
      summary: Mark notifications as read
      operationId: markNotificationsRead
      responses:
        '200':
          description: Notifications marked

  /portal/notifications/{notificationId}/file-url:
    get:
      tags: [Portal - Notifications]
      summary: Get file URL attached to a notification
      operationId: getNotificationFileUrl
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: File URL

  # ──────────────────────────────────────────────
  # PORTAL - PREFERENCES
  # ──────────────────────────────────────────────
  /portal/preferences/artists:
    get:
      tags: [Portal - Preferences]
      summary: List saved artists
      operationId: getPreferencesArtists
      responses:
        '200':
          description: Artist list

  /portal/preferences/label/:
    get:
      tags: [Portal - Preferences]
      summary: List labels
      operationId: getPreferencesLabels
      parameters:
        - $ref: '#/components/parameters/page'
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated label list

  /portal/preferences/artist-via-link:
    get:
      tags: [Portal - Preferences]
      summary: Look up artist by platform link
      operationId: getArtistViaLink
      parameters:
        - name: link
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: platform
          in: query
          required: true
          schema:
            type: string
            enum: [spotify, apple, amazonMusic, meta, soundcloud]
      responses:
        '200':
          description: Artist info from link

  /portal/preferences/search/artist-platform:
    post:
      tags: [Portal - Preferences]
      summary: Search for an artist on a platform
      operationId: searchArtistPlatform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [term, platform]
              properties:
                term:
                  type: string
                  description: Search term
                platform:
                  type: string
                  enum: [spotify, apple, amazonMusic, meta, soundcloud]
      responses:
        '200':
          description: Search results

  # ──────────────────────────────────────────────
  # PORTAL - AUDIENCE
  # ──────────────────────────────────────────────
  /portal/audience/findAll/:
    get:
      tags: [Portal - Audience]
      summary: List audience/fans
      operationId: findAllAudience
      parameters:
        - $ref: '#/components/parameters/page'
        - name: sort
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated audience list


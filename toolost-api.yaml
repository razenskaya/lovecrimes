              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: string
                    example:
                      - Pop
                      - Rock
                      - Hip-Hop/Rap
                      - Electronic
                      - R&B/Soul

# ═══════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: toolost_session
      description: Session cookie set after login

  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    releaseId:
      name: releaseId
      in: path
      required: true
      schema:
        type: integer

  schemas:
    # ── User ──
    User:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        email:
          type: string
          format: email
        confirmed:
          type: integer
        type:
          type: string
          enum: [artist, label]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        priority_member:
          type: integer
        admin_access:
          type: integer
        website:
          type: string
          nullable: true
        banned:
          type: integer
        is_subscribed_newsletter:
          type: integer
        has_completed_init:
          type: integer
        bulk_import_option:
          type: integer
        instant_advance:
          type: integer
        asset_tokens:
          type: integer
        production_music_account:
          type: integer

    # ── Release (response) ──
    Release:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        status:
          type: integer
          description: "0=Draft, 1=Live, 2=Pending, 3=Takedown, etc."
        title:
          type: string
        remix_or_version:
          type: string
          nullable: true
        type:
          type: string
          enum: [Single, EP, Album]
        upc:
          type: string
        catalog_number:
          type: string
        label:
          type: string
        primary_genre:
          type: string
        secondary_genre:
          type: string
          nullable: true
        language:
          type: string
        license_type:
          type: string
          enum: [Copyright, Creative Commons]
        license_info:
          type: string
          nullable: true
        c_year:
          type: string
        c_line:
          type: string
        p_year:
          type: string
        p_line:
          type: string
        territories:
          type: string
          nullable: true
        cover_url:
          type: string
          format: uri
        cover_url_small:
          type: string
          format: uri
        cover_url_medium:
          type: string
          format: uri
        cover_url_large:
          type: string
          format: uri
        release_date:
          type: string
          format: date
        original_release_date:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        remix_title:
          type: string
          nullable: true
        cover_songs:
          type: string
          nullable: true
        is_ai_cover_url:
          type: integer
        delivery_soundcloud:
          type: integer
        delivery_youtube:
          type: integer
        delivery_soundexchange:
          type: integer
        delivery_beatport:
          type: integer
        delivery_junodownload:
          type: integer
        delivery_tracklib:
          type: integer
        delivery_facebook:
          type: integer
        delivery_hook:
          type: integer
        delivery_audiosalad_completed:
          type: integer
        admin_review:
          type: integer
        priority_review:
          type: integer
        restrict_takedown:
          type: integer

    # ── Release (input) ──
    ReleaseInput:
      type: object
      properties:
        id:
          type: integer
          nullable: true
          description: "null for new releases, set for updates"
        type:
          type: string
          enum: [Single, EP, Album]
        title:
          type: string
        coverUrl:
          type: string
          format: uri
        compressedArtwork:
          type: string
          format: uri
        motion_art_1_1:
          type: string
          nullable: true
        motion_art_3_4:
          type: string
          nullable: true
        isAiGenerated:
          type: boolean
        version:
          type: string
          nullable: true
          enum: [Original, Remix, Live, Remastered]
        remixTitle:
          type: string
        coverSongs:
          type: string
        label:
          type: string
        upc:
          type: string
          description: Leave empty to auto-generate
        primaryGenre:
          type: string
        secondaryGenre:
          type: string
          nullable: true
        language:
          type: string
          description: ISO 639-1 code
          example: en
        originalReleaseDate:
          type: string
          format: date
        releaseDate:
          type: string
          format: date
        applePreorder:
          type: boolean
        applePreorderDate:
          type: string
          format: date
          nullable: true
        licenseType:
          type: string
          enum: [Copyright, Creative Commons]
        licenseInfo:
          type: string
        cYear:
          type: string
        cLine:
          type: string
        pYear:
          type: string
        pLine:
          type: string
        soundCloud:
          type: integer
          description: "0 or 1 — deliver to SoundCloud"
        trackLibs:
          type: integer
        junoDownloads:
          type: integer
        beatPort:
          type: integer
        beatPortForm:
          type: object
          properties:
            hasAccount:
              type: boolean
            deliveryLink:
              type: string
            logo:
              type: string
            removeImg:
              type: boolean
            newLogo:
              type: string
              nullable: true
            link:
              type: string
              nullable: true
        soundExchange:
          type: integer
        facebook:
          type: integer
        hook:
          type: integer
        udio:
          type: integer
        lyricfind:
          type: integer
        even:
          type: integer
        youtube:
          type: integer
        itunesPricingTier:
          type: string
          example: digital_45
        itunesTrackPricingTier:
          type: string
          example: front
        timeZone:
          type: string
          nullable: true
        releaseTime:
          type: string
          nullable: true
        reviewNote:
          type: string
        reviewFileName:
          type: string
        reviewFile:
          type: string
          nullable: true
        aiDocumentationFileUrl:
          type: string
          nullable: true
        aiDocumentationFileName:
          type: string
          nullable: true
        territories:
          type: array
          items:
            type: string
          description: ISO country codes; empty = worldwide
        platforms:
          type: array
          items:
            type: string
          description: Platform IDs; empty = all platforms
        platformActive:
          type: boolean
          description: Whether custom platform selection is active
        trackCount:
          type: integer
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
        selectedLicenses:
          type: array
          items:
            type: object

    # ── Track (response) ──
    Track:
      type: object
      properties:
        id:
          type: integer
        release_id:
          type: integer
        title:
          type: string
        isrc:
          type: string
        iswc:
          type: string
          nullable: true
        language:
          type: string
        explicit_lyrics:
          type: integer
        clean_version:
          type: integer
        remix_or_version:
          type: string
          nullable: true
        primary_genre:
          type: string
          nullable: true
        secondary_genre:
          type: string
          nullable: true
        p_year:
          type: string
          nullable: true
        p_line:
          type: string
          nullable: true
        audio_url:
          type: string
        liner_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    # ── Track (input) ──
    TrackInput:
      type: object
      required: [title, url]
      properties:
        id:
          type: integer
          nullable: true
        title:
          type: string
        isrc:
          type: string
          description: Leave empty to auto-generate
        iswc:
          type: string
          nullable: true
        language:
          type: string
        tiktokStartTime:
          type: object
          properties:
            min:
              type: string
            sec:
              type: string
        url:
          type: string
          description: S3 audio file path
        linerNote:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        lyrics:
          type: string
          nullable: true
        explicitLyrics:
          type: boolean
        cleanVersion:
          type: boolean
        instrumentalUrl:
          type: string
          nullable: true
        dolbyUrl:
          type: string
          nullable: true
        admFileUrl:
          type: boolean
        admEmail:
          type: string
        aiAssisted:
          type: boolean
        aiAssistedFileUrl:
          type: string
          nullable: true
        aiAssistedFileName:
          type: string
          nullable: true
        artists:
          type: array
          items:
            $ref: '#/components/schemas/TrackArtist'
        writers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              role:
                type: string
                enum: [author, composer, instrumentalist, arranger, publisher]
        credits:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              role:
                type: string
                description: Semicolon-separated roles
                example: "Lead Vocals;Executive Producer"

    # ── Participant ──
    Participant:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        name:
          type: string
        artistId:
          type: integer
          nullable: true
        role:
          type: string
          enum: [primary, featured, remixer]
        connect:
          $ref: '#/components/schemas/ArtistConnect'

    # ── Track Artist ──
    TrackArtist:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        default:
          type: boolean
        role:
          type: string
          enum: [primary, featured, remixer]
        connect:
          $ref: '#/components/schemas/ArtistConnect'

    # ── Artist Platform Connections ──
    ArtistConnect:
      type: object
      properties:
        spotify:
          $ref: '#/components/schemas/PlatformLink'
        apple:
          $ref: '#/components/schemas/PlatformLink'
        amazonMusic:
          $ref: '#/components/schemas/PlatformLink'
        meta:
          $ref: '#/components/schemas/PlatformLink'
        soundcloud:
          $ref: '#/components/schemas/PlatformLink'

    PlatformLink:
      type: object
      properties:
        status:
          type: boolean
        url:
          type: string
          format: uri
          nullable: true

    # ── Wallet Balance ──
    WalletBalance:
      type: object
      properties:
        available:
          type: number
          format: double
        earnings:
          type: number
          format: double
        adjustment:
          type: number
          format: double
        manual_entry:
          type: number
          format: double
        wallet_incoming:
          type: number
          format: double
        wallet_outgoing:
          type: number
          format: double
        payouts:
          type: number
          format: double
        sales:
          type: number
          format: double
        publishing:
          type: number
          format: double
        cover_licensing_refund:
          type: number
          format: double
        youtube_mcn:
          type: number
          format: double

    # ── Pagination wrapper ──
    PaginatedResponse:
      type: object
      properties:
        current_page:
          type: integer
        data:
          type: array
          items:
            type: object
        first_page_url:
          type: string
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        last_page_url:
          type: string
        next_page_url:
          type: string
          nullable: true
        path:
          type: string
        per_page:
          type: integer
        prev_page_url:
          type: string
          nullable: true
        to:
          type: integer
          nullable: true
        total:
          type: integer

security:
  - cookieAuth: []
